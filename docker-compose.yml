services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ragdocs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/ragdocs
      SECRET_KEY: change-me-in-production
      DEBUG: "true"
      PG_HOST: db
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_NAME: ragdocs
      # Optional LLM integration — uncomment and fill in to enable:
      # LLM_API_BASE: https://api.openai.com/v1
      # LLM_API_KEY: sk-...
      # LLM_MODEL: gpt-4o-mini
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount source for development hot-reload (remove for production)
      - .:/app

volumes:
  pgdata:
