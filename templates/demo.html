<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Docs API - Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8f9fa;
      color: #212529;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #6c757d;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .subtitle a {
      color: #0d6efd;
      text-decoration: none;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #dee2e6;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
      color: #495057;
    }

    input[type="text"], textarea, select {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #ced4da;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: inherit;
      margin-bottom: 0.75rem;
      resize: vertical;
      background: #fff;
    }

    input[type="text"]:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #0d6efd;
      box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
    }

    .inline-row {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    .inline-row .field {
      flex: 1;
      min-width: 120px;
    }

    .inline-row .field label { margin-bottom: 0.4rem; }
    .inline-row .field input,
    .inline-row .field select { margin-bottom: 0; }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .checkbox-row input[type="checkbox"] { width: auto; margin: 0; cursor: pointer; }
    .checkbox-row label { margin: 0; cursor: pointer; font-size: 0.875rem; color: #495057; }

    button {
      background: #0d6efd;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.5rem 1.25rem;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #0b5ed7; }
    button:disabled { background: #6ea8fe; cursor: not-allowed; }

    .status {
      font-size: 0.85rem;
      margin-top: 0.75rem;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      display: none;
    }

    .status.success { background: #d1e7dd; color: #0f5132; display: block; }
    .status.error   { background: #f8d7da; color: #842029; display: block; }
    .status.info    { background: #cff4fc; color: #055160; display: block; }

    .answer-box {
      margin-top: 1rem;
    }

    .badges {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }

    .answer-text {
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      padding: 1rem;
      font-size: 0.9rem;
      white-space: pre-wrap;
      line-height: 1.6;
      min-height: 80px;
    }

    .citations {
      margin-top: 1rem;
    }

    .citations h3 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #6c757d;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .citation-item {
      background: #f8f9fa;
      border-left: 3px solid #0d6efd;
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.5rem;
      border-radius: 0 6px 6px 0;
      font-size: 0.85rem;
    }

    .citation-item strong { color: #212529; }
    .citation-score {
      display: inline-block;
      background: #e9ecef;
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 0.75rem;
      margin-left: 0.5rem;
      color: #495057;
    }

    .mode-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .mode-extractive   { background: #fff3cd; color: #664d03; }
    .mode-llm          { background: #d1e7dd; color: #0f5132; }
    .mode-vector       { background: #cfe2ff; color: #084298; }
    .mode-lexical      { background: #e2d9f3; color: #432874; }
    .mode-hybrid       { background: #d1ecf1; color: #0c5460; }
    .mode-reranked     { background: #fde8d8; color: #7a3d0a; }

    .docs-link {
      font-size: 0.85rem;
      color: #6c757d;
      margin-top: 1rem;
    }

    .docs-link a { color: #0d6efd; }

    .faithfulness-bar {
      margin-top: 0.75rem;
    }

    .faithfulness-bar label {
      font-size: 0.8rem;
      color: #6c757d;
      margin-bottom: 0.2rem;
    }

    .bar-track {
      background: #e9ecef;
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .bar-fill.high   { background: #198754; }
    .bar-fill.medium { background: #ffc107; }
    .bar-fill.low    { background: #dc3545; }

    .abstain-notice {
      margin-top: 0.75rem;
      padding: 0.6rem 0.9rem;
      background: #fff3cd;
      border-left: 3px solid #ffc107;
      border-radius: 0 6px 6px 0;
      font-size: 0.85rem;
      color: #664d03;
    }

    .claims-section {
      margin-top: 1rem;
    }

    .claims-section h3 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #6c757d;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .claim-item {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.35rem 0;
      font-size: 0.85rem;
      border-bottom: 1px solid #f1f3f5;
    }

    .claim-item:last-child { border-bottom: none; }

    .claim-label {
      flex-shrink: 0;
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .label-supported   { background: #d1e7dd; color: #0f5132; }
    .label-unsupported { background: #f8d7da; color: #842029; }
    .label-neutral     { background: #e2d9f3; color: #432874; }
  </style>
</head>
<body>
  <div class="container">
    <h1>RAG Docs API</h1>
    <p class="subtitle">
      Hybrid semantic + lexical document search with grounded answers.
      &mdash; <a href="/api/docs/" target="_blank">API Docs (Swagger)</a>
      &middot; <a href="/api/schema/" target="_blank">OpenAPI Schema</a>
    </p>

    <!-- Ingest Panel -->
    <div class="card">
      <h2>1. Ingest a Document</h2>

      <label for="doc-title">Title</label>
      <input type="text" id="doc-title" placeholder="e.g. Cell Biology Overview">

      <label for="doc-text">Document Text</label>
      <textarea id="doc-text" rows="8"
        placeholder="Paste the document text here. It will be split into overlapping chunks, embedded with a local sentence-transformer model, and stored in pgvector for retrieval."></textarea>

      <button id="ingest-btn" onclick="ingestDocument()">Ingest Document</button>
      <div id="ingest-status" class="status"></div>
    </div>

    <!-- Query Panel -->
    <div class="card">
      <h2>2. Ask a Question</h2>

      <label for="question">Question</label>
      <input type="text" id="question" placeholder="e.g. What is the role of mitochondria?"
        onkeydown="if(event.key==='Enter') askQuestion()">

      <div class="inline-row">
        <div class="field">
          <label for="top-k">Top-K chunks</label>
          <input type="text" id="top-k" value="5" style="width:80px;">
        </div>
        <div class="field">
          <label for="retrieval-mode">Retrieval mode</label>
          <select id="retrieval-mode">
            <option value="hybrid" selected>hybrid (vector + lexical)</option>
            <option value="vector">vector only</option>
            <option value="lexical">lexical only</option>
          </select>
        </div>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="rerank" checked>
        <label for="rerank">Cross-encoder rerank (more accurate, ~100 ms extra latency)</label>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="use-stream">
        <label for="use-stream">Stream answer (Server-Sent Events)</label>
      </div>

      <button id="query-btn" onclick="askQuestion()">Ask</button>
      <div id="query-status" class="status"></div>

      <div id="answer-box" class="answer-box" style="display:none;">
        <div class="badges">
          <span id="answer-mode-badge" class="mode-badge"></span>
          <span id="retrieval-mode-badge" class="mode-badge"></span>
          <span id="rerank-badge" class="mode-badge" style="display:none;"></span>
        </div>

        <div class="faithfulness-bar" id="faithfulness-bar" style="display:none;">
          <label id="faithfulness-label">Faithfulness: -</label>
          <div class="bar-track">
            <div class="bar-fill" id="faithfulness-fill" style="width:0%"></div>
          </div>
        </div>

        <div class="abstain-notice" id="abstain-notice" style="display:none;">
          Low faithfulness - answer replaced with an abstention message.
        </div>

        <div class="answer-text" id="answer-text"></div>

        <div class="claims-section" id="claims-section" style="display:none;">
          <h3>Claim verification</h3>
          <div id="claims-list"></div>
        </div>

        <div class="citations" id="citations-section" style="display:none;">
          <h3>Citations</h3>
          <div id="citations-list"></div>
        </div>
      </div>
    </div>

    <p class="docs-link">
      Full API reference: <a href="/api/docs/">/api/docs/</a>
    </p>
  </div>

  <script>
    async function ingestDocument() {
      const title = document.getElementById('doc-title').value.trim();
      const text  = document.getElementById('doc-text').value.trim();
      const status = document.getElementById('ingest-status');
      const btn = document.getElementById('ingest-btn');

      if (!title || !text) {
        showStatus(status, 'error', 'Please fill in both title and document text.');
        return;
      }

      btn.disabled = true;
      showStatus(status, 'info', 'Ingesting… this may take a moment while the model embeds the chunks.');

      try {
        const resp = await fetch('/api/v1/documents', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, raw_text: text }),
        });

        const data = await resp.json();

        if (resp.ok) {
          showStatus(status, 'success',
            `Document ingested! ID: ${data.id}, ${data.chunk_count} chunks created.`);
        } else {
          showStatus(status, 'error', `Error: ${JSON.stringify(data, null, 2)}`);
        }
      } catch (err) {
        showStatus(status, 'error', `Network error: ${err.message}`);
      } finally {
        btn.disabled = false;
      }
    }

    async function askQuestion() {
      const question = document.getElementById('question').value.trim();
      const topK = parseInt(document.getElementById('top-k').value, 10) || 5;
      const mode = document.getElementById('retrieval-mode').value;
      const rerank = document.getElementById('rerank').checked;
      const useStream = document.getElementById('use-stream').checked;
      const status = document.getElementById('query-status');
      const btn = document.getElementById('query-btn');
      const answerBox = document.getElementById('answer-box');

      if (!question) {
        showStatus(status, 'error', 'Please enter a question.');
        return;
      }

      btn.disabled = true;
      answerBox.style.display = 'none';
      showStatus(status, 'info', 'Searching…');

      const body = JSON.stringify({ question, top_k: topK, mode, rerank });

      if (useStream) {
        await askStream(question, body, status, btn, answerBox, mode, rerank);
      } else {
        await askNormal(body, status, btn, answerBox);
      }
    }

    async function askNormal(body, status, btn, answerBox) {
      try {
        const resp = await fetch('/api/v1/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body,
        });

        const data = await resp.json();

        if (resp.ok) {
          status.style.display = 'none';
          renderAnswer(data);
        } else {
          showStatus(status, 'error', `Error: ${JSON.stringify(data)}`);
        }
      } catch (err) {
        showStatus(status, 'error', `Network error: ${err.message}`);
      } finally {
        btn.disabled = false;
      }
    }

    async function askStream(question, body, status, btn, answerBox, mode, rerank) {
      try {
        const resp = await fetch('/api/v1/query/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body,
        });

        if (!resp.ok) {
          const err = await resp.text();
          showStatus(status, 'error', `Error: ${err}`);
          btn.disabled = false;
          return;
        }

        status.style.display = 'none';

        // Show answer box with streaming badge
        document.getElementById('answer-mode-badge').textContent = 'Streaming';
        document.getElementById('answer-mode-badge').className = 'mode-badge mode-extractive';
        document.getElementById('retrieval-mode-badge').textContent = mode;
        document.getElementById('retrieval-mode-badge').className = `mode-badge mode-${mode}`;
        const rerankBadge = document.getElementById('rerank-badge');
        if (rerank) {
          rerankBadge.textContent = 'reranked';
          rerankBadge.className = 'mode-badge mode-reranked';
          rerankBadge.style.display = '';
        } else {
          reankBadge.style.display = 'none';
        }
        const answerEl = document.getElementById('answer-text');
        answerEl.textContent = '';
        document.getElementById('citations-section').style.display = 'none';
        answerBox.style.display = 'block';

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data:')) continue;
            const fragment = line.slice(5).trim();
            if (fragment === '[DONE]') { btn.disabled = false; return; }
            answerEl.textContent += fragment.replace(/\\n/g, '\n');
          }
        }
      } catch (err) {
        showStatus(status, 'error', `Stream error: ${err.message}`);
      } finally {
        btn.disabled = false;
      }
    }

    function renderAnswer(data) {
      const box = document.getElementById('answer-box');
      const answerModeBadge = document.getElementById('answer-mode-badge');
      const retrievalModeBadge = document.getElementById('retrieval-mode-badge');
      const rerankBadge = document.getElementById('rerank-badge');
      const answerEl = document.getElementById('answer-text');
      const citationsList = document.getElementById('citations-list');
      const citationsSection = document.getElementById('citations-section');
      const faithfulnessBar = document.getElementById('faithfulness-bar');
      const faithfulnessLabel = document.getElementById('faithfulness-label');
      const faithfulnessFill = document.getElementById('faithfulness-fill');
      const abstainNotice = document.getElementById('abstain-notice');
      const claimsSection = document.getElementById('claims-section');
      const claimsList = document.getElementById('claims-list');

      answerModeBadge.textContent = data.mode === 'llm' ? 'LLM-grounded answer' : 'Extractive answer';
      answerModeBadge.className = `mode-badge mode-${data.mode}`;

      retrievalModeBadge.textContent = data.retrieval_mode || 'hybrid';
      retrievalModeBadge.className = `mode-badge mode-${data.retrieval_mode || 'hybrid'}`;

      if (data.reranked) {
        rerankBadge.textContent = 'reranked';
        rerankBadge.className = 'mode-badge mode-reranked';
        rerankBadge.style.display = '';
      } else {
        rerankBadge.style.display = 'none';
      }

      if (typeof data.faithfulness === 'number') {
        const pct = Math.round(data.faithfulness * 100);
        faithfulnessLabel.textContent = `Faithfulness: ${pct}%`;
        faithfulnessFill.style.width = `${pct}%`;
        faithfulnessFill.className = 'bar-fill ' + (pct >= 70 ? 'high' : pct >= 40 ? 'medium' : 'low');
        faithfulnessBar.style.display = '';
      } else {
        faithfulnessBar.style.display = 'none';
      }

      abstainNotice.style.display = data.abstained ? '' : 'none';

      answerEl.textContent = data.answer;

      claimsList.innerHTML = '';
      if (data.claims && data.claims.length > 0) {
        claimsSection.style.display = '';
        data.claims.forEach(c => {
          const div = document.createElement('div');
          div.className = 'claim-item';
          const labelClass = `claim-label label-${c.label.toLowerCase()}`;
          div.innerHTML = `<span class="${labelClass}">${escapeHtml(c.label)}</span><span>${escapeHtml(c.text)}</span>`;
          claimsList.appendChild(div);
        });
      } else {
        claimsSection.style.display = 'none';
      }

      citationsList.innerHTML = '';
      if (data.citations && data.citations.length > 0) {
        citationsSection.style.display = '';
        data.citations.forEach((c, i) => {
          const div = document.createElement('div');
          div.className = 'citation-item';
          div.innerHTML = `
            <strong>[${i+1}] ${escapeHtml(c.document_title)}</strong>
            - chunk ${c.chunk_index}
            <span class="citation-score">score: ${c.similarity.toFixed(4)}</span>
          `;
          citationsList.appendChild(div);
        });
      } else {
        citationsSection.style.display = 'none';
      }

      box.style.display = 'block';
    }

    function showStatus(el, type, msg) {
      el.className = `status ${type}`;
      el.textContent = msg;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }
  </script>
</body>
</html>
